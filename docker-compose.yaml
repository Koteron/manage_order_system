services:
  db:
    image: postgres:18
    container_name: order_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.6.1
    container_name: order_redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.0.0 # Using stable 4.0.0
    container_name: order_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_NUM_PARTITIONS: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-init:
    image: apache/kafka:4.0.0
    container_name: kafka_init
    depends_on:
      - kafka
    entrypoint: [ "/bin/bash", "-c" ]
    command: 
      - |
        echo "Waiting for Kafka..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          sleep 2
        done

        echo "Creating topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic new_order \
          --replication-factor 1 \
          --partitions 1
        
        echo "Setup complete."

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: order_kafka_ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka-init
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
  
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: order_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  web:
    build: ./web
    container_name: order_fastapi_app
    ports:
      - "8000:8000"
    command: sh -c "uv run --active alembic upgrade head && uv run --active main.py"
    depends_on:
      - db
      - redis
      - kafka-init
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_TTL=300.0
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092

  kafka-consumer:
    build: ./kafka_consumer
    container_name: order_kafka_consumer
    depends_on:
      - kafka-init
      - rabbitmq
      - web
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB}
      - REDIS_TTL=${REDIS_TTL}
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672

  celery-worker:
    build: ./celery_worker
    container_name: order_celery_worker
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672

volumes:
  postgres_data:
